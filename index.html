<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); padding: 15px; }
        .service-item { 
            background: var(--tg-theme-secondary-bg-color); 
            border-radius: 10px; padding: 15px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid var(--tg-theme-hint-color);
        }
        button { 
            background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); 
            border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; 
        }
    </style>
</head>
<body>
    <h3 style="text-align: center;">Выберите услугу</h3>
    <div id="services-list">
        <p style="text-align: center;">Загрузка услуг...</p>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // 1. Получаем данные из URL
        const urlParams = new URLSearchParams(window.location.search);
        const rawData = urlParams.get('data');
        const container = document.getElementById('services-list');

        if (rawData) {
            try {
                const services = JSON.parse(decodeURIComponent(rawData));
                container.innerHTML = ''; // Очищаем текст загрузки

                // 2. Создаем кнопки для каждой услуги из БД
                services.forEach(s => {
                    const div = document.createElement('div');
                    div.className = 'service-item';
                    div.innerHTML = `
                        <div>
                            <b>${s.n}</b><br>
                            <small>${s.p}</small>
                        </div>
                        <button onclick="selectService('${s.n}')">Выбрать</button>
                    `;
                    container.appendChild(div);
                });
            } catch (e) {
                container.innerHTML = 'Ошибка загрузки данных.';
            }
        } else {
            container.innerHTML = 'Услуги не найдены. Обратитесь к админу.';
        }

        function selectService(name) {
            tg.sendData(JSON.stringify({service: name}));
        }
    </script>
</body>
</html>
