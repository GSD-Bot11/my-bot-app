<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); padding: 15px; }
        .service-card { 
            background: var(--tg-theme-secondary-bg-color); border-radius: 12px; 
            padding: 15px; margin-bottom: 10px; border: 1px solid var(--tg-theme-hint-color);
        }
        .service-header { display: flex; justify-content: space-between; align-items: center; }
        .pink-btn { 
            background: #e91e63; color: white; border: none; 
            padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        .booking-form { display: none; margin-top: 15px; border-top: 1px solid var(--tg-theme-hint-color); padding-top: 10px; }
        input, select { 
            width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; 
            background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); border: 1px solid var(--tg-theme-hint-color);
        }
        .confirm-btn { 
            background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); 
            width: 100%; border: none; padding: 12px; border-radius: 8px; margin-top: 10px; font-weight: bold;
        }
    </style>
</head>
<body>
    <h3 style="text-align: center;">Наши услуги</h3>
    <div id="services-container"></div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const services = JSON.parse(decodeURIComponent(urlParams.get('data') || '[]'));
        const container = document.getElementById('services-container');

        services.forEach((s, index) => {
            const card = document.createElement('div');
            card.className = 'service-card';
            card.innerHTML = `
                <div class="service-header">
                    <div><b>${s.n}</b><br><small>${s.p}</small></div>
                    <button class="pink-btn" onclick="showForm(${index})">Выбрать</button>
                </div>
                <div id="form-${index}" class="booking-form">
                    <label>Дата:</label>
                    <input type="date" id="date-${index}">
                    <label>Время:</label>
                    <select id="time-${index}">
                        <option value="09:00">09:00</option>
                        <option value="12:00">12:00</option>
                        <option value="15:00">15:00</option>
                        <option value="18:00">18:00</option>
                    </select>
                    <button class="confirm-btn" onclick="sendAllData('${s.n}', ${index})">Подтвердить запись</button>
                </div>
            `;
            container.appendChild(card);
        });

        function showForm(index) {
            // Скрываем все открытые формы
            document.querySelectorAll('.booking-form').forEach(f => f.style.display = 'none');
            // Показываем нужную
            document.getElementById(`form-${index}`).style.display = 'block';
        }

        function sendAllData(serviceName, index) {
            const date = document.getElementById(`date-${index}`).value;
            const time = document.getElementById(`time-${index}`).value;

            if (!date) {
                tg.showAlert("Пожалуйста, выберите дату!");
                return;
            }

            const result = {
                service: serviceName,
                date: date,
                time: time
            };
            tg.sendData(JSON.stringify(result));
        }
    </script>
</body>
</html>
