<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #222222);
            --hint: var(--tg-theme-hint-color, #999999);
            --btn: var(--tg-theme-button-color, #e91e63);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
            --secondary: var(--tg-theme-secondary-bg-color, #f4f4f4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: var(--secondary);
            color: var(--text);
            font-weight: bold;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #e91e63;
            color: white;
        }

        .step { display: none; animation: fadeIn 0.3s ease; }
        .step.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--secondary);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid var(--hint);
            background: var(--secondary);
            color: var(--text);
            box-sizing: border-box;
        }

        .main-btn {
            background: #e91e63;
            color: white;
            width: 100%;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .time-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .time-slot {
            background: var(--secondary);
            padding: 12px;
            text-align: center;
            border-radius: 10px;
        }

        .time-slot.selected { border: 2px solid #e91e63; }
    </style>
</head>
<body>

    <div class="tabs">
        <button id="tab-client" class="tab-btn active" onclick="showTab('client')">Записаться</button>
        <button id="tab-admin" class="tab-btn" onclick="showTab('admin')">Админ</button>
    </div>

    <div id="step1" class="step active">
        <div id="services-list"></div>
    </div>

    <div id="step2" class="step">
        <h3>Выберите дату</h3>
        <input type="date" id="date-input">
        <button class="main-btn" onclick="showStep(3)">Далее</button>
    </div>

    <div id="step3" class="step">
        <h3>Выберите время</h3>
        <div class="time-grid" id="time-grid"></div>
        <button class="main-btn" style="margin-top:20px" onclick="sendBooking()">Подтвердить запись</button>
    </div>

    <div id="admin-panel" class="step">
        <h3>Добавить новую услугу</h3>
        <input type="text" id="new-service-name" placeholder="Название (например: Стрижка)">
        <input type="number" id="new-service-price" placeholder="Цена (например: 1500)">
        <button class="main-btn" onclick="sendNewService()">Добавить услугу</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let booking = { serviceId: null, serviceName: null, date: null, time: null };
        const params = new URLSearchParams(window.location.search);

        // --- ЛОГИКА СКРЫТИЯ АДМИНКИ ---
        const userRole = params.get('role');
        if (userRole !== 'admin') {
            const adminTabBtn = document.getElementById('tab-admin');
            if (adminTabBtn) adminTabBtn.style.display = 'none';
        }

        // Парсинг услуг
        const rawData = params.get('data');
        if (rawData) {
            try {
                const services = JSON.parse(decodeURIComponent(rawData));
                const list = document.getElementById('services-list');
                services.forEach(s => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<div><b>${s.n}</b><br><small>${s.p}₽</small></div>
                                      <button class="tab-btn active" style="width:auto" onclick="selectService(${s.id}, '${s.n}')">Выбрать</button>`;
                    list.appendChild(card);
                });
            } catch(e) { console.error("Ошибка парсинга услуг", e); }
        }

        function showTab(type) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(type === 'client') {
                document.getElementById('step1').classList.add('active');
                document.getElementById('tab-client').classList.add('active');
            } else {
                document.getElementById('admin-panel').classList.add('active');
                document.getElementById('tab-admin').classList.add('active');
            }
        }

        function showStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + n).classList.add('active');
        }

        function selectService(id, name) {
            booking.serviceId = id;
            booking.serviceName = name;
            showStep(2);
        }

        // Время
        const timeGrid = document.getElementById('time-grid');
        ["09:00", "10:00", "11:00", "12:00", "14:00", "15:00", "16:00", "17:00"].forEach(t => {
            const div = document.createElement('div');
            div.className = 'time-slot';
            div.innerText = t;
            div.onclick = () => {
                document.querySelectorAll('.time-slot').forEach(el => el.classList.remove('selected'));
                div.classList.add('selected');
                booking.time = t;
            };
            timeGrid.appendChild(div);
        });

        function sendBooking() {
            booking.date = document.getElementById('date-input').value;
            if(!booking.date || !booking.time) return tg.showAlert("Выберите дату и время!");
            tg.sendData(JSON.stringify(booking));
        }

        function sendNewService() {
            const name = document.getElementById('new-service-name').value;
            const price = document.getElementById('new-service-price').value;
            if(!name || !price) return tg.showAlert("Заполните все поля!");
            
            tg.sendData(JSON.stringify({
                action: 'add_service',
                name: name,
                price: price
            }));
        }
    </script>
</body>
</html>
