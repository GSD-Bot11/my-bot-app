<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); padding: 15px; }
        .step { margin-bottom: 20px; border-bottom: 1px solid var(--tg-theme-hint-color); padding-bottom: 15px; }
        select, input { width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid var(--tg-theme-hint-color); background: var(--tg-theme-secondary-bg-color); color: var(--tg-theme-text-color); }
        .main-button { background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="step">
        <label>Выберите услугу:</label>
        <select id="service-select"></select>
    </div>

    <div class="step">
        <label>Выберите дату:</label>
        <input type="date" id="date-input">
    </div>

    <div class="step">
        <label>Выберите время:</label>
        <select id="time-select">
            <option value="09:00">09:00</option>
            <option value="12:00">12:00</option>
            <option value="15:00">15:00</option>
            <option value="18:00">18:00</option>
        </select>
    </div>

    <button class="main-button" onclick="confirmBooking()">Записаться</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Загружаем услуги из URL (как мы делали раньше)
        const urlParams = new URLSearchParams(window.location.search);
        const rawData = urlParams.get('data');
        const select = document.getElementById('service-select');

        if (rawData) {
            const services = JSON.parse(decodeURIComponent(rawData));
            services.forEach(s => {
                let opt = document.createElement('option');
                opt.value = s.n;
                opt.innerHTML = `${s.n} (${s.p})`;
                select.appendChild(opt);
            });
        }

        function confirmBooking() {
            const service = document.getElementById('service-select').value;
            const date = document.getElementById('date-input').value;
            const time = document.getElementById('time-select').value;

            if (!date) {
                alert("Пожалуйста, выберите дату");
                return;
            }

            const result = {
                service: service,
                date: date,
                time: time
            };

            tg.sendData(JSON.stringify(result));
        }
    </script>
</body>
</html>
